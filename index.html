<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Chess</h1>
        </header>
        <div id="game-area">
            <div id="side-panel-black" class="side-panel">
                <div class="side-player">
                    <div id="player-black" class="player-info">
                        <span class="dot black-dot"></span> Black
                    </div>
                    <div id="captured-by-black" class="captured-row"></div>
                </div>
            </div>
            <div id="board-container">
                <div id="board"></div>
            </div>
            <div id="side-panel-white" class="side-panel">
                <div class="side-player">
                    <div id="player-white" class="player-info active">
                        <span class="dot white-dot"></span> White
                    </div>
                    <div id="captured-by-white" class="captured-row"></div>
                </div>
            </div>
        </div>
        <div id="message"></div>
        <button id="new-game-btn">New Game</button>
    </div>
    <script src="chess.js"></script>
</body>
</html>
